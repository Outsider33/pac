<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Schéma BAR-TH-143 — système solaire combiné">
  <rect width="400" height="240" fill="#F2EDE3"/>
  <line x1="20" y1="200" x2="380" y2="200" stroke="#d4d6cf" stroke-width="1"/>

  <!-- Soleil (haut droite, terracotta) -->
  <circle cx="338" cy="46" r="18" fill="#C87F5A" opacity="0.9"/>
  <g stroke="#C87F5A" stroke-width="1.6" stroke-linecap="round" opacity="0.7">
    <line x1="338" y1="18" x2="338" y2="26"/><line x1="366" y1="46" x2="374" y2="46"/>
    <line x1="358" y1="26" x2="364" y2="20"/><line x1="358" y1="66" x2="364" y2="72"/>
  </g>
  <!-- Rayons vers le capteur -->
  <g stroke="#C87F5A" stroke-width="1.4" stroke-linecap="round" opacity="0.5">
    <line x1="320" y1="58" x2="250" y2="86"/><line x1="328" y1="66" x2="262" y2="96"/>
  </g>

  <!-- Capteur solaire (panneau incliné, gauche-centre) -->
  <g transform="translate(150,90) rotate(-18)">
    <rect x="-60" y="-16" width="120" height="32" rx="2" fill="#F4EFE6" stroke="#1F2B1E" stroke-width="2"/>
    <g stroke="#C87F5A" stroke-width="1" opacity="0.5">
      <line x1="-40" y1="-16" x2="-40" y2="16"/><line x1="-20" y1="-16" x2="-20" y2="16"/>
      <line x1="0" y1="-16" x2="0" y2="16"/><line x1="20" y1="-16" x2="20" y2="16"/><line x1="40" y1="-16" x2="40" y2="16"/>
    </g>
  </g>
  <text x="118" y="64" font-family="Inter,system-ui" font-size="8.5" font-weight="500" letter-spacing="0.14em" fill="#5B6355">SOLAIRE</text>

  <!-- Flux chaud solaire vers le ballon (terracotta) -->
  <g stroke="#C87F5A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 168 120 L 168 138 L 196 138"/>
  </g>
  <path d="M 192 133 L 200 138 L 192 143 Z" fill="#C87F5A"/>

  <!-- Ballon de stockage (centre) -->
  <rect x="200" y="112" width="46" height="74" rx="6" fill="#7A9471" opacity="0.14" stroke="#1F2B1E" stroke-width="2"/>
  <g stroke="#C87F5A" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 210 128 q 8 6 16 0 q 8 -6 16 0"/><path d="M 210 144 q 8 6 16 0 q 8 -6 16 0"/><path d="M 210 160 q 8 6 16 0 q 8 -6 16 0"/>
  </g>
  <text x="223" y="180" font-family="Inter" font-size="7.5" font-weight="500" letter-spacing="0.12em" fill="#5B6355" text-anchor="middle">BALLON</text>

  <!-- Unité PAC d'appoint (droite du ballon) -->
  <rect x="262" y="128" width="50" height="58" rx="5" fill="#F4EFE6" stroke="#1F2B1E" stroke-width="2"/>
  <g transform="translate(287,160)">
    <circle r="13" fill="none" stroke="#1F2B1E" stroke-width="1.5"/>
    <path d="M 0 -9 L 3 -2 L -3 -2 Z" fill="#1F2B1E" opacity="0.7"/>
    <path d="M 7.8 4.5 L 0 2 L 4.5 8.5 Z" fill="#1F2B1E" opacity="0.7"/>
    <path d="M -7.8 4.5 L 0 2 L -4.5 8.5 Z" fill="#1F2B1E" opacity="0.7"/>
  </g>
  <text x="287" y="122" font-family="Inter" font-size="7.5" font-weight="500" letter-spacing="0.12em" fill="#5B6355" text-anchor="middle">APPOINT PAC</text>
  <!-- air sage capté par la PAC -->
  <g opacity="0.6" stroke="#7A9471" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 340 150 q -12 -6 -22 0"/><path d="M 340 166 q -12 -6 -22 0"/>
  </g>

  <!-- Eau chaude vers la maison (gauche, terracotta) -->
  <g stroke="#C87F5A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 200 150 L 120 150"/>
  </g>
  <path d="M 125 147 L 120 150 L 125 153 Z" fill="#C87F5A"/>
  <g stroke="#C87F5A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 88 146 q 5 -8 0 -16"/><path d="M 100 146 q 5 -8 0 -16"/>
  </g>
  <text x="96" y="172" font-family="Inter" font-size="8.5" font-weight="500" letter-spacing="0.14em" fill="#5B6355" text-anchor="middle">EAU CHAUDE</text>

  <text x="200" y="222" font-family="Inter" font-size="9" letter-spacing="0.04em" fill="#5B6355" text-anchor="middle">Système solaire combiné — le soleil chauffe, la pompe à chaleur complète</text>
</svg>
