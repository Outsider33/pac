<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Schéma BAR-TH-171 — pompe à chaleur air/eau">
  <defs>
    <linearGradient id="airIn171" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7A9471" stop-opacity="0"/><stop offset="100%" stop-color="#7A9471" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="#F2EDE3"/>
  <line x1="20" y1="200" x2="380" y2="200" stroke="#d4d6cf" stroke-width="1"/>

  <!-- Air extérieur capté (droite, sage) -->
  <g opacity="0.7" stroke="#7A9471" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 392 92 Q 372 87, 362 97 T 332 97"/>
    <path d="M 392 118 Q 372 113, 362 123 T 332 123"/>
    <path d="M 392 144 Q 372 139, 362 149 T 332 149"/>
  </g>
  <text x="388" y="74" font-family="Inter,system-ui" font-size="8.5" font-weight="500" letter-spacing="0.14em" fill="#5B6355" text-anchor="end">AIR EXTÉRIEUR</text>

  <!-- Unité PAC extérieure (droite) -->
  <rect x="262" y="86" width="68" height="96" rx="6" fill="#F4EFE6" stroke="#1F2B1E" stroke-width="2"/>
  <rect x="262" y="86" width="68" height="16" fill="#7A9471" opacity="0.18"/>
  <g transform="translate(296,140)">
    <circle r="20" fill="none" stroke="#1F2B1E" stroke-width="1.5"/>
    <path d="M 0 -14 L 5 -3 L -5 -3 Z" fill="#1F2B1E" opacity="0.7"/>
    <path d="M 12.1 7 L 0 3 L 7 13.5 Z" fill="#1F2B1E" opacity="0.7"/>
    <path d="M -12.1 7 L 0 3 L -7 13.5 Z" fill="#1F2B1E" opacity="0.7"/>
    <circle r="2.5" fill="#1F2B1E"/>
  </g>

  <!-- Compresseur (entre unité et eau) -->
  <circle cx="226" cy="120" r="16" fill="none" stroke="#C87F5A" stroke-width="2"/>
  <circle cx="226" cy="120" r="7" fill="#C87F5A" opacity="0.4"/>
  <text x="226" y="150" font-family="Inter" font-size="7.5" font-weight="500" letter-spacing="0.12em" fill="#5B6355" text-anchor="middle">COMPRESSEUR</text>

  <!-- Circuit d'eau chaude vers le radiateur (terracotta, dépard/retour) -->
  <g stroke="#C87F5A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 210 110 L 130 110"/>
    <path d="M 130 138 L 210 138" opacity="0.55"/>
    <path d="M 242 112 L 262 112"/>
    <path d="M 262 152 L 242 152" opacity="0.55"/>
  </g>
  <path d="M 135 107 L 130 110 L 135 113 Z" fill="#C87F5A"/>

  <!-- Radiateur (gauche) -->
  <rect x="78" y="96" width="52" height="62" rx="3" fill="#F4EFE6" stroke="#1F2B1E" stroke-width="2"/>
  <g stroke="#C87F5A" stroke-width="2" opacity="0.5">
    <line x1="88" y1="100" x2="88" y2="154"/><line x1="98" y1="100" x2="98" y2="154"/>
    <line x1="108" y1="100" x2="108" y2="154"/><line x1="118" y1="100" x2="118" y2="154"/>
  </g>
  <!-- Chaleur qui monte -->
  <g stroke="#C87F5A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 92 92 q 5 -8 0 -16"/><path d="M 104 92 q 5 -8 0 -16"/><path d="M 116 92 q 5 -8 0 -16"/>
  </g>
  <text x="104" y="174" font-family="Inter" font-size="8.5" font-weight="500" letter-spacing="0.14em" fill="#5B6355" text-anchor="middle">CHAUFFAGE</text>

  <!-- Légende -->
  <text x="200" y="222" font-family="Inter" font-size="9" letter-spacing="0.04em" fill="#5B6355" text-anchor="middle">Pompe à chaleur air/eau — l'énergie de l'air, transformée en chauffage</text>
</svg>
